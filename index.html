<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik+Bubbles&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Rubik Bubbles', cursive;
    background: white;
    color: #ff4d6d; /* ❤️ لون الخط */
    overflow: hidden;
}

#content {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

button {
    padding: 12px 25px;
    border-radius: 20px;
    border: none;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    font-family: 'Rubik Bubbles', cursive;
}

/* 🔥 بوكس أكبر + كلام أكبر */
.box {
    border: 2px solid black;
    width: 320px;
    height: 320px;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: auto;
    font-size: 18px;
    line-height: 1.5;
}

/* صورة دائرية */
.circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
}

img {
    margin-top: 15px;
    max-width: 200px;
}

/* ❤️ القلوب */
.heart {
    position: absolute;
    width: 15px;
    height: 15px;
    background: #ff4d6d; /* ❤️ */
    transform: rotate(45deg);
    opacity: 0.25;
    filter: blur(1px);
    z-index: 1;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 15px;
    height: 15px;
    background: #ff4d6d;
    border-radius: 50%;
}

.heart::before { top: -8px; left: 0; }
.heart::after { left: -8px; top: 0; }

@keyframes float {
    from { transform: translateY(0) rotate(45deg); }
    to { transform: translateY(-110vh) rotate(45deg); }
}
</style>
</head>

<body>

<div id="content"></div>

<script>

let content = document.getElementById("content");

/* ❤️ hearts */
setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart";
    h.style.left = Math.random() * 100 + "vw";
    h.style.bottom = "-20px";
    h.style.animation = "float 7s linear";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),7000);
}, 400);

/* PAGE 1 */
function page1() {
    content.innerHTML = `
    <h1>Happy Birthday To Our Monster Nour! yay❤️.</h1>
    <img src="image1.jpg.jpeg" class="circle">
    <p>click on continue to see your birthday gift</p>
    <button onclick="page2()">Continue</button>
    `;
}

/* PAGE 2 */
function page2() {
    content.innerHTML = `
    <h1>conditions to get your gift is :</h1>
    <div id="step2"></div>
    <button onclick="page3()">Continue</button>
    `;

    setTimeout(()=>{
        document.getElementById("step2").innerHTML += `
        <p>to don't look like this on your birthday :</p>
        <img src="image2.jpg.jpeg">
        `;
    },600);

    setTimeout(()=>{
        document.getElementById("step2").innerHTML += `
        <p>or even like this :</p>
        <img src="image3.jpg.jpeg">
        `;
    },1400);
}

/* PAGE 3 */
function page3() {
    content.innerHTML = `
    <h1>Thats your gift for being a good boy (me and Nelly choose them for you) :</h1>
    <div id="gift"></div>
    <p id="q"></p>
    <div id="btns"></div>
    `;

    setTimeout(()=>{
        document.getElementById("gift").innerHTML = `<img src="image4.jpg.jpeg">`;
    },500);

    setTimeout(()=>{
        document.getElementById("q").innerText = "would you accept our gift?hehehehehe";
    },900);

    setTimeout(()=>{
        document.getElementById("btns").innerHTML = `
        <button onclick="page4()">Yes</button>
        <button onclick="page4()">also yes</button>
        `;
    },1300);
}

/* PAGE 4 */
function page4() {
    content.innerHTML = `
    <div class="box">
    Happy birthday!! In your beautiful birthday please enjoy and don't overthink,
    you deserve all the best and we believe in you, you are our best friend,
    or I'm going to slap you (you obviously know who is going to slap you hehehe),
    so can you promise us to stay happy always?
    </div>

    <div>
        <button id="yes">Yes</button>
        <button id="no">No</button>
    </div>
    `;

    let yes = document.getElementById("yes");
    let no = document.getElementById("no");

    let size = 18;

    document.addEventListener("mousemove", (e) => {
        let rect = no.getBoundingClientRect();
        let dx = e.clientX - (rect.left + rect.width/2);
        let dy = e.clientY - (rect.top + rect.height/2);
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 80) {
            no.style.position = "absolute";
            no.style.left = Math.random()*window.innerWidth + "px";
            no.style.top = Math.random()*window.innerHeight + "px";

            size += 3;
            yes.style.fontSize = size + "px";
        }
    });

    yes.onclick = finalPage;
}

/* FINAL */
function finalPage() {
    content.innerHTML = `
    <h1 style="font-size:50px;">GOOD BOY❤️</h1>
    <h1 style="font-size:50px;">hehehehehehe</h1>
    <img src="image5.jpg.jpeg">
    `;
}

page1();

</script>

</body>
</html>
